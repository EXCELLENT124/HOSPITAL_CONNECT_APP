name: Build iOS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: Build Flutter iOS app
    runs-on: macos-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install Flutter packages
        run: flutter pub get

      - name: Patch device_info_plus iOS Vision selector
        run: |
          python3 - <<'PY'
          from pathlib import Path

          cache = Path.home() / ".pub-cache" / "hosted" / "pub.dev"
          files = list(cache.glob("device_info_plus-*/ios/device_info_plus/Sources/device_info_plus/FPPDeviceInfoPlusPlugin.m"))
          if not files:
              raise SystemExit("device_info_plus iOS source file was not found")

          for path in files:
              lines = path.read_text().splitlines()
              patched = []
              changed = False
              for line in lines:
                  if "[info isiOSAppOnVision]" in line:
                      indent = line[: len(line) - len(line.lstrip())]
                      patched.append(f"{indent}isiOSAppOnVision = [NSNumber numberWithBool:NO];")
                      changed = True
                  else:
                      patched.append(line)
              if changed:
                  path.write_text("\n".join(patched) + "\n")
                  print(f"Patched unsupported isiOSAppOnVision selector in {path}")
              else:
                  print(f"No isiOSAppOnVision selector found in {path}")
          PY

      - name: Run tests
        run: flutter test

      - name: Build iOS without code signing
        run: >
          flutter build ios --release --no-codesign
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r HealthConnectApp-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HealthConnectApp-unsigned-ipa
          path: build/ios/ipa/HealthConnectApp-unsigned.ipa
